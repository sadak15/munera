<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Account — Munera Skincare</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Marcellus&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="stylesheet" href="assets/css/pages.css">
</head>
<body class="auth-body">

  <div id="app-header"></div>
  <div id="toast-container"></div>

  <main class="auth-main">
    <div class="auth-card auth-card-wide">

      <div class="auth-card-brand">
        <a href="index.html" class="auth-logo">
          <span class="logo-name">MUNERA</span>
          <span class="logo-tagline">SKINCARE</span>
        </a>
      </div>

      <div class="auth-card-head">
        <h1>Create Account</h1>
        <p>Join Munera and unlock your personalised skincare journey.</p>
      </div>

      <form class="auth-form" id="register-form" novalidate>

        <div class="form-row-2">
          <div class="form-group">
            <label for="first-name" class="form-label">First Name</label>
            <input type="text" id="first-name" class="form-input" placeholder="Name" autocomplete="given-name" required>
            <span class="field-error" id="first-name-error"></span>
          </div>
          <div class="form-group">
            <label for="last-name" class="form-label">Last Name</label>
            <input type="text" id="last-name" class="form-input" placeholder="Last name" autocomplete="family-name" required>
            <span class="field-error" id="last-name-error"></span>
          </div>
        </div>

        <div class="form-group">
          <label for="email" class="form-label">Email Address</label>
          <div class="input-icon-wrap">
            <i class="fas fa-envelope input-icon"></i>
            <input type="email" id="email" class="form-input" placeholder="you@example.com" autocomplete="email" required>
          </div>
          <span class="field-error" id="email-error"></span>
        </div>

        <div class="form-group">
          <label for="password" class="form-label">Password</label>
          <div class="input-icon-wrap">
            <i class="fas fa-lock input-icon"></i>
            <input type="password" id="password" class="form-input" placeholder="Min. 8 characters" autocomplete="new-password" required>
            <button type="button" class="password-toggle" id="toggle-password" aria-label="Show password">
              <i class="fas fa-eye"></i>
            </button>
          </div>
          <div class="password-strength" id="password-strength"></div>
          <span class="field-error" id="password-error"></span>
        </div>

        <div class="form-group">
          <label for="confirm-password" class="form-label">Confirm Password</label>
          <div class="input-icon-wrap">
            <i class="fas fa-lock input-icon"></i>
            <input type="password" id="confirm-password" class="form-input" placeholder="Repeat your password" autocomplete="new-password" required>
          </div>
          <span class="field-error" id="confirm-password-error"></span>
        </div>

        <div class="form-group form-check-group">
          <label class="form-check">
            <input type="checkbox" id="newsletter"> Subscribe to our newsletter for skincare tips &amp; offers
          </label>
        </div>
        <div class="form-group form-check-group">
          <label class="form-check">
            <input type="checkbox" id="terms" required> I agree to the <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>
          </label>
          <span class="field-error" id="terms-error"></span>
        </div>

        <div class="form-error-banner" id="form-error" style="display:none"></div>

        <button type="submit" class="btn btn-gold btn-lg btn-block" id="submit-btn">
          Create Account
        </button>
      </form>

      <div class="auth-switch">
        Already have an account? <a href="login.html">Sign in</a>
      </div>

    </div>
  </main>

  <div id="app-footer"></div>
  <script src="assets/js/api.js"></script>
  <script src="assets/js/app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      if (API.session.isLoggedIn()) { window.location.href = 'account.html'; return; }

      // Password toggle
      document.getElementById('toggle-password')?.addEventListener('click', () => {
        const input = document.getElementById('password');
        const icon = document.querySelector('#toggle-password i');
        input.type = input.type === 'password' ? 'text' : 'password';
        icon.className = input.type === 'password' ? 'fas fa-eye' : 'fas fa-eye-slash';
      });

      // Password strength meter
      document.getElementById('password')?.addEventListener('input', e => {
        const val = e.target.value;
        const meter = document.getElementById('password-strength');
        let strength = 0;
        if (val.length >= 8) strength++;
        if (/[A-Z]/.test(val)) strength++;
        if (/[0-9]/.test(val)) strength++;
        if (/[^A-Za-z0-9]/.test(val)) strength++;
        const labels = ['', 'Weak', 'Fair', 'Good', 'Strong'];
        const classes = ['', 'weak', 'fair', 'good', 'strong'];
        meter.innerHTML = val
          ? `<div class="strength-bar strength-${classes[strength]}"></div><span>${labels[strength]}</span>`
          : '';
      });

      // Form submit
      document.getElementById('register-form')?.addEventListener('submit', async e => {
        e.preventDefault();
        clearErrors();

        const firstName = document.getElementById('first-name').value.trim();
        const lastName  = document.getElementById('last-name').value.trim();
        const email     = document.getElementById('email').value.trim();
        const password  = document.getElementById('password').value;
        const confirm   = document.getElementById('confirm-password').value;
        const terms     = document.getElementById('terms').checked;
        let valid = true;

        if (!firstName) { showFieldError('first-name', 'First name is required.'); valid = false; }
        if (!lastName)  { showFieldError('last-name', 'Last name is required.'); valid = false; }
        if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { showFieldError('email', 'Enter a valid email.'); valid = false; }
        if (password.length < 8) { showFieldError('password', 'Password must be at least 8 characters.'); valid = false; }
        if (password !== confirm) { showFieldError('confirm-password', 'Passwords do not match.'); valid = false; }
        if (!terms) { showFieldError('terms', 'You must accept the terms to continue.'); valid = false; }

        if (!valid) return;

        const btn = document.getElementById('submit-btn');
        btn.disabled = true;
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Creating account…';

        const res = await API.auth.register({ firstName, lastName, email, password });

        if (res.success) {
          Toast.show('Account created! Welcome to Munera ✨', 'success');
          setTimeout(() => { window.location.href = 'account.html'; }, 900);
        } else {
          showFormError(res.error || 'Registration failed. Please try again.');
          btn.disabled = false;
          btn.innerHTML = 'Create Account';
        }
      });

      function showFieldError(field, msg) {
        document.getElementById(`${field}-error`).textContent = msg;
        document.getElementById(field)?.classList.add('input-error');
      }
      function showFormError(msg) {
        const el = document.getElementById('form-error');
        el.textContent = msg; el.style.display = 'block';
      }
      function clearErrors() {
        document.querySelectorAll('.field-error').forEach(e => e.textContent = '');
        document.querySelectorAll('.form-input').forEach(i => i.classList.remove('input-error'));
        const fe = document.getElementById('form-error');
        fe.textContent = ''; fe.style.display = 'none';
      }
    });
  </script>
</body>
</html>
